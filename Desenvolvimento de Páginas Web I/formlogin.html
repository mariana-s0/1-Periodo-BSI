<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <!-- CSS Local -->
    <link rel="stylesheet" href="form.css">
    <!-- Ícones e Fonte -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section>
            <h1>LOGIN</h1>
            
            <form>
                <!-- Grupo de Usuário -->
                <div class="campo-entrada">
                    <label>Username</label>
                    <div class="input-com-icone">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" placeholder="Type your username">
                    </div>
                </div>

                <!-- Grupo de Senha -->
                <div class="campo-entrada">
                    <label>Password</label>
                    <div class="input-com-icone">
                        <span class="material-symbols-outlined">lock</span>
                        <input type="password" placeholder="Type your password">
                    </div>
                    <a href="#" class="link-esqueceu">Forgot password?</a>
                </div>

                <!-- Botão que já aprendeste -->
                <button type="submit" class="botao-login">LOGIN</button>
            </form>

            <!-- Rodapé do formulário -->
            <div class="rodape">
                <p>Or Sign Up Using</p>
                <div class="redes-sociais">
                    <div class="bola fb"></div>
                    <div class="bola tw"></div>
                    <div class="bola gp"></div>
                </div>
                <p>Or Sign Up Using</p>
                <a href="#" class="link-signup">SIGN UP</a>
            </div>
        </section>
    </main>
</body>
</html>
